---
# sshdconf task change handlers

- name: restart sshd
  ansible.builtin.systemd_service:
    name: "sshd"
    state: "restarted"
    enabled: true

- name: reload sshd
  ansible.builtin.systemd_service:
    name: "sshd"
    state: "reloaded"
    enabled: true

- name: start sshd
  ansible.builtin.systemd_service:
    name: "sshd"
    state: "started"
    enabled: true
